<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="看展日记">
  <meta name="theme-color" content="#FAF7F2">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            background: "#fcf9f8",
            "surface-container": "#f0eded",
            "secondary-fixed": "#ffdad3",
            "inverse-on-surface": "#f3f0ef",
            outline: "#7f7664",
            "surface-bright": "#fcf9f8",
            "on-background": "#1c1b1b",
            "inverse-surface": "#313030",
            "on-surface-variant": "#4d4636",
            "ink-secondary": "#666666",
            "surface-container-highest": "#e5e2e1",
            "on-secondary-fixed-variant": "#6c382f",
            "tertiary-container": "#dcdad5",
            "surface-variant": "#e5e2e1",
            "primary-fixed": "#ffdf95",
            "charcoal-text": "#1A1A1A",
            "primary": "#765a00",
            "on-primary-fixed": "#251a00",
            "coral-pink": "#FFB5A7",
            "warm-yellow": "#FFD56B",
            "primary-container": "#ffd56b",
            "primary-fixed-dim": "#eac25a",
            "outline-variant": "#d1c5b1",
            "paper-shadow": "rgba(26, 26, 26, 0.08)",
            "on-primary": "#ffffff",
            "on-primary-container": "#775b00",
            "surface-container-lowest": "#ffffff",
            "inverse-primary": "#eac25a",
            "on-surface": "#1c1b1b",
            "on-primary-fixed-variant": "#594400",
            "surface-dim": "#dcd9d9",
            "cream-base": "#FAF7F2",
            "surface-container-low": "#f6f3f2",
            "on-secondary-container": "#7a4439",
            "surface-tint": "#765a00",
            "surface-container-high": "#eae7e7"
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px"
          },
          spacing: {
            "container-margin": "20px",
            "section-gap": "32px",
            "stack-md": "12px",
            "stack-sm": "4px",
            base: "8px",
            "gutter-md": "16px"
          },
          fontFamily: {
            "headline-lg-mobile": ["Playfair Display"],
            "headline-lg": ["Playfair Display"],
            "body-lg": ["Quicksand"],
            "label-sm": ["Quicksand"],
            "title-md": ["Playfair Display"],
            caption: ["Quicksand"],
            "body-md": ["Quicksand"],
            "display-lg": ["Playfair Display"]
          },
          fontSize: {
            "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
            "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
            "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "500"}],
            "label-sm": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "700"}],
            "title-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
            caption: ["12px", {"lineHeight": "16px", "fontWeight": "600"}],
            "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "500"}],
            "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Quicksand', 'PingFang SC', 'Microsoft YaHei', 'Playfair Display', sans-serif;
      background-color: #F4FAFC;
      min-height: max(884px, 100dvh);
    }
    .hand-drawn-border {
      border: 2px solid #1A1A1A;
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
    }
    .sticker-rotate-1 { transform: rotate(-1.2deg); }
    .sticker-rotate-2 { transform: rotate(0.8deg); }
    .sticker-rotate-3 { transform: rotate(-0.5deg); }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .chick-float {
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    .fade-in { animation: fadeIn 0.25s ease-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* 滚动条隐藏 */
    ::-webkit-scrollbar { width: 0; height: 0; }
    /* 隐藏 number input 上下箭头 */
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
  <title>看展日记</title>
</head>
<body class="text-on-surface pb-24">
  <div id="app"></div>
  <script src="js/storage.js"></script>
  <script src="js/router.js"></script>
  <script src="js/data-seed.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
